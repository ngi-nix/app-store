name: Test templates

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  test-template:
    name: Test ${{ matrix.template }} template
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - template: provider
          - template: consumer

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@19effe9fe722874e6d46dd7182e4b8b7a43c4a99 # v31.10.0

      - uses: cachix/cachix-action@v16
        with:
          name: ngi-forge
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Create test directory
        run: |
          mkdir -p /tmp/template-test

      - name: Initialize git repository
        working-directory: /tmp/template-test
        run: |
          git init

      - name: Initialize ${{ matrix.template }} template
        working-directory: /tmp/template-test
        run: |
          nix flake init -t ${{ github.workspace }}#${{ matrix.template }}
          sed -i 's|ngi-forge.url = .*;|ngi-forge.url = "path:${{ github.workspace }}";|g' flake.nix
          git add ./*

      - name: Show flake info
        working-directory: /tmp/template-test
        run: |
          nix flake metadata
          nix flake show

      - name: Build hello-nix package
        working-directory: /tmp/template-test
        run: |
          nix build .#hello-nix --accept-flake-config

      - name: Build hello-app
        working-directory: /tmp/template-test
        run: |
          nix build .#hello-app --accept-flake-config
          nix build .#hello-app.container --accept-flake-config
          nix build .#hello-app.vm --accept-flake-config

      - name: Build _forge-ui
        working-directory: /tmp/template-test
        run: |
          nix build .#_forge-ui --accept-flake-config
          test -f result/index.html
          test -f result/forge-config.json
